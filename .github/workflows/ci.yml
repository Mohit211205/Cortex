name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cortex
          POSTGRES_PASSWORD: cortex
          POSTGRES_DB: cortex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://cortex:cortex@localhost:5432/cortex
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pytest tests/unit -v --tb=short

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://cortex:cortex@localhost:5432/cortex
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pytest tests/integration -v --tb=short
